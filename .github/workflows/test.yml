name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Generate coverage report
        run: npm run test -- --run --coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Check coverage thresholds
        run: node scripts/check-coverage.js
        continue-on-error: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run E2E on main branch pushes to save CI minutes
    if: github.ref == 'refs/heads/main' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        continue-on-error: true

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # This job succeeds if all required tests pass
  # Used as a single status check for branch protection
  tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-and-integration]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.unit-and-integration.result }}" == "success" ]]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "❌ Tests failed"
            exit 1
          fi
